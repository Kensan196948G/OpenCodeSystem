name: Feature Request
description: 機能追加・改善要望
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: 概要
      description: 何をしたいか
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 理由・背景
  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - High
        - Medium
        - Low
